<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Makes the browser UI disappear on mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GT Messenger </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --gt-blue: #0078FF;
            --bg-white: #ffffff;
            --text-main: #000000;
            --text-muted: #65676b;
            --border-light: #f0f2f5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg-white); color: var(--text-main); overflow-x: hidden; }

        /* HEADER (Matched to Image) */
        .header { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    padding: 8px 18px; /* Reduced from 15px to 8px to make it slimmer */
    position: sticky; 
    top: 0; 
    background: #fff; 
    z-index: 1000; 
    border-bottom: 1px solid #f0f2f5; /* Optional: adds a clean separator */
   }
        .header-left { display: flex; align-items: center; gap: 0px; }
        .logo-img {
         width: 28px;  /* Try 28px instead of 35px */
         height: 28px;
         }
        .header-left h1 {
         font-size: 18px; /* Reduced from 19px or 20px */
         font-weight: 700;
         color: var(--gt-blue);
         letter-spacing: -0.3px;
         margin: 0;
         padding-left: 5px;
        }

       /* 1. The Main Container - Pushes Left and Right apart */
       .header-right { 
            display: flex; 
            gap: 12px; /* Reduced gap between the two buttons */
            align-items: center; 
        }

        .top-action { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 2px; /* Tighter space between icon and text */
            cursor: pointer; 
            position: relative;
            min-width: 50px; /* Ensures consistent spacing */
        }

        .top-action .icon-bg { 
            width: 30px; /* Reduced from 45px */
            height: 30px; /* Reduced from 45px */
            background: #f0f2f5; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 14px; /* Smaller icon size */
            color: #000;
        }

        .top-action span { 
            font-size: 9px; /* Smaller text label */
            font-weight: 600; 
            color: #000;
        }
        
        /* STORIES SECTION */
        .section-title { padding: 0px 20px 5px; font-size: 15px; font-weight: 700; }
        .stories-wrapper { display: flex; gap: 15px; padding: 0 20px 5px; overflow-x: auto; scrollbar-width: none; min-height: 85px; align-items: center; }
        .stories-wrapper::-webkit-scrollbar { display: none; }
        .story-hint { font-size: 12px; color: var(--text-muted); font-style: italic; }

        .story-item { display: flex; flex-direction: column; align-items: center; min-width: 75px; gap: 8px; }
        .story-avatar { width: 70px; height: 70px; border-radius: 50%; padding: 3px; border: 3px solid var(--gt-blue); }
        .story-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #fff; }
        .section-title {
         margin-top: 18px !important; /* Forces the text itself to move away from the header */
         margin-bottom: 10px;        /* Adds a little space between the text and the bubbles */
        }

/* TABS */
.tabs {
    display: flex;
    justify-content: space-between;
    align-items: center;
    
    /* 1. The Break-Out Logic */
    width: calc(100% + 64px); /* Adds back the space lost to container padding */
    margin-left: -32px;       /* Pulls it to the far left edge */
    margin-right: -32px;      /* Pulls it to the far right edge */
    
    /* 2. Internal Spacing */
    /* 15px here acts as a new 'safe zone' so text doesn't touch the glass */
    padding: 0 5px 10px; 
    
    /* 3. Positioning & Visuals */
    border-bottom: 1px solid var(--border-light);
    background: #fff;
    position: sticky;
    top: 70px; 
    z-index: 900;
    box-sizing: border-box; 
}

.tab {
    flex: 1; /* This forces each tab to take up exactly 33.3% of the width */
    text-align: center;
    padding: 12px 0; /* Slightly more vertical padding for a better hit area */
    cursor: pointer;
    color: #8e8e8e;
    font-size: 15px; /* Slightly larger for readability */
    font-weight: 600;
    transition: all 0.2s ease;
}

.tab.active {
    color: var(--gt-blue);
    font-weight: 800; /* Bold for the active state */
}
        
        /* CHAT LIST LAYOUT (The Vertical Illustration) */
        .chat-list { padding: 0px 20px; }
        .chat-item { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid transparent; }
        .chat-pfp-wrapper { position: relative; }
        .chat-pfp { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        .online-status { position: absolute; bottom: 2px; right: 2px; background: #4cd964; color: #000; font-size: 10px; font-weight: bold; padding: 1px 4px; border-radius: 10px; border: 2px solid #fff; }

        .chat-info { flex: 1; }
        .chat-info h3 { font-size: 17px; font-weight: 700; }
        .chat-msg { font-size: 14px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .unread-indicator { width: 18px; height: 18px; background: #ff3b30; color: #fff; font-size: 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* EMPTY STATE */
        .empty-welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 120px; color: var(--text-muted); text-align: center; }
        .empty-welcome i { font-size: 60px; color: var(--border-light); margin-bottom: 15px; }
        
/* Floating Action Button Container */
.fab-container {
    position: fixed;
    bottom: 25px; /* Distance from bottom */
    right: 25px;  /* Distance from right */
    z-index: 2000; /* Keeps it on top of everything */
}

/* The actual Blue Button */
.fab-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background-color: var(--gt-blue); /* Uses your existing blue variable */
    color: #ffffff;
    border: none;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(0, 120, 255, 0.4); /* Soft blue glow */
    cursor: pointer;
    transition: transform 0.2s, background-color 0.2s;
}

/* Hover & Click Effects */
.fab-btn:hover {
    background-color: #006ae6; /* Slightly darker on hover */
    transform: scale(1.05);    /* Slight grow effect */
}

.fab-btn:active {
    transform: scale(0.95);    /* Slight shrink when pressed */
    }

    /* FAB & Overlay Styles */
.fab-container { position: fixed; bottom: 25px; right: 25px; z-index: 2000; }
.fab-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--gt-blue); color: #fff; border: none; font-size: 24px; box-shadow: 0 4px 15px rgba(0,120,255,0.4); cursor: pointer; }

.new-chat-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); z-index: 2100;
    display: none; align-items: flex-end;
}

.new-chat-card {
    width: 100%; height: 85vh; background: #fff;
    border-radius: 25px 25px 0 0; display: flex; flex-direction: column;
    animation: slideUp 0.3s ease-out;
}

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

/* Header & Search */
.nc-header { padding: 15px 20px; border-bottom: 1px solid var(--border-light); }
.nc-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.nc-nav { display: flex; gap: 20px; }
.nc-tab { font-size: 14px; font-weight: 700; color: #888; cursor: pointer; position: relative; padding-bottom: 5px; }
.nc-tab.active { color: var(--gt-blue); border-bottom: 3px solid var(--gt-blue); }
.nc-count { font-size: 11px; background: #f0f2f5; padding: 2px 8px; border-radius: 10px; color: #555; }

.nc-search-container {
    background: #f0f2f5; border-radius: 10px; padding: 8px 15px;
    display: flex; align-items: center; gap: 10px;
}
.nc-search-container input {
    background: none; border: none; outline: none; width: 100%; font-size: 14px;
}

/* Scroll Area */
.nc-body { flex: 1; overflow-y: auto; padding: 10px 20px; }
.nc-user-item { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
.nc-user-pfp { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
.nc-user-name { font-weight: 600; font-size: 15px; }    

/* The Plus Badge style */
.story-avatar.add-story {
    position: relative;
    border: 3px solid #f0f2f5 !important;
}

.add-icon-badge {
    position: absolute;
    bottom: 0;
    right: 0;
    background: var(--gt-blue);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 10px;
}

/* The style for when YOU have an active story */
.story-avatar.active-story {
    border: 3px solid var(--gt-blue) !important;
}
/* The class that hides the stories */
.stories-hidden {
    display: none !important;
}

/* Rotate chevron when closed */
.chevron-rotate {
    transform: rotate(-90deg);
}

/* Ensure the layout shifts smoothly */
#stories-collapsible {
    transition: all 0.3s ease;
    overflow: hidden;
}

  /* Container for the text below the bubble */
.story-item span {
    font-size: 12px;
    font-weight: 500;
    color: #000;
    max-width: 75px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* When NO story is active, make the ring grey/subtle */
.story-avatar.no-story {
    border: 3px solid #f0f2f5 !important;
}

/* Ensure the image stays perfectly round inside the ring */
.story-avatar img {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #eee;
 }

 /* MOBILE-OPTIMIZED TOAST */
#toast-container {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(0, 0, 0, 0.9);
    color: white;
    padding: 12px 22px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 500;
    z-index: 999999; /* ALWAYS on top */
    
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
}

/* Visible state */
#toast-container.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

    /* Dropdown Styling */
.story-dropdown-content {
    display: none;
    position: absolute;
    top: 45px;
    right: 0;
    background: white;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    border-radius: 10px;
    width: 150px;
    z-index: 2001;
}
.dropdown-item {
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
}

/* Full Screen Overlays */
.story-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: white; z-index: 3000;
    display: none; flex-direction: column;
}
.editor-bg { background: #000; }

.editor-top {
    display: flex; justify-content: space-between; padding: 20px;
    position: absolute; top: 0; width: 100%; z-index: 10;
}
.share-btn {
    background: var(--gt-blue); color: white; border: none;
    padding: 8px 20px; border-radius: 5px; font-weight: bold;
}
.editor-action { color: white; font-weight: bold; }

#editing-preview-img {
    width: 100%; height: 100%; object-fit: cover;
  
} 
     
/* --- 1. OVERLAY & LAYOUT STRUCTURE --- */
.chat-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    z-index: 1000;
    display: none; /* Controlled by JS */
    flex-direction: column;
}

.chat-header {
    padding: 15px;
    background: #111;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    gap: 15px;
}

.chat-header i { cursor: pointer; font-size: 20px; }

.header-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid #333;
}

.chat-user-info { display: flex; flex-direction: column; }
#chat-user-name { font-weight: bold; color: white; }
.status-dot { font-size: 11px; color: #4ade80; }

.message-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* --- 2. CHAT BUBBLES (SENT & RECEIVED) --- */
.message {
    display: flex;
    flex-direction: column;
    max-width: 75%;
    padding: 10px 15px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.4;
    position: relative;
}

.message.sent {
    align-self: flex-end;
    background: #007bff; /* Blue for you */
    color: white;
    border-bottom-right-radius: 4px;
}

.message.received {
    align-self: flex-start;
    background: #333; /* Dark grey for them */
    color: white;
    border-bottom-left-radius: 4px;
}

/* --- 3. BUBBLE INNER COMPONENTS (TIME & SEEN) --- */
.msg-content {
    word-wrap: break-word;
    margin-bottom: 2px;
}

.msg-footer {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    opacity: 0.7;
    margin-top: 4px;
}

.msg-time { color: #eee; }

.status-text {
    color: #4ade80; /* Green for "Seen" */
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* --- 4. INPUT BAR --- */
.chat-input-bar {
    padding: 15px;
    background: #111;
    display: flex;
    gap: 10px;
    border-top: 1px solid #333;
}

#message-input {
    flex: 1;
    background: #222;
    border: none;
    padding: 12px;
    border-radius: 25px;
    color: white;
    outline: none;
}

.chat-input-bar button {
    background: #007bff;
    border: none;
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* --- 5. SIDEBAR / LIST COMPONENTS --- */
.unread-dot {
    position: absolute;
    top: 0;
    right: 0;
    width: 12px;
    height: 12px;
    background: #007bff;
    border-radius: 50%;
    border: 2px solid #000;
    z-index: 5;
}

.chat-time {
    font-size: 11px;
    color: #666;
}

//* The Checkmark Icon (The one you just asked about) */
.fa-circle-check {
    font-size: 12px;
    margin-left: 5px;
    transition: all 0.3s ease; /* Smooth transition when it changes to solid */
    
}

 /* Pulse animation for the typing indicator */
.status-dot {
    transition: all 0.3s ease;
}

/* This targets the status dot specifically when it says typing... */
.status-dot:empty:before { content: ""; } /* prevents layout shift */

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
}

/* We apply the animation via a class if we want, or just keep it simple */       
 </style>

userStatusChannel
  .on('presence', { event: 'sync' }, () => {
    const newState = userStatusChannel.presenceState();
    // This logs who is online in the console for debugging
    console.log('Online users synced:', newState);
  })
  .subscribe(async (status) => {
    if (status === 'SUBSCRIBED') {
      await userStatusChannel.track({
        user_id: myId,
        online_at: new Date().toISOString(),
      });
    }
  });

// --- TYPING SIGNAL LISTENER ---
const typingChannel = _supabase.channel(`chat:${myId}`);

typingChannel
  .on('broadcast', { event: 'typing' }, (payload) => {
    // Only show "typing..." if the person typing is the one I currently have open
    if (payload.sender_id === currentChatId) {
      const statusText = document.querySelector('.status-dot'); 
      if (statusText) {
        if (payload.isTyping) {
          statusText.innerText = 'typing...';
          statusText.style.color = '#007bff'; // Blue for typing
        } else {
          statusText.innerText = 'Online';
          statusText.style.color = '#4ade80'; // Green for online
        }
      }
    }
  })
  .subscribe();     

let currentChatId = null; // This allows the listener to check who you are talking to
let typingTimeout;
     
// If no user is logged in, redirect them or show an error
if (!myId || myId === 'null') {
    // Option A: Redirect to your login page
    // window.location.href = "login.html"; 
    
    // Option B: Hard stop (the app won't load for hackers)
    console.error("Access Denied: Please log in.");
}

let followingData = []; 
let myProfileData = null; // We will store your name and PFP here
let toastTimer;

// 2. UTILITY: THE TOAST SYSTEM
function showToast(message) {
    const toast = document.getElementById('toast-container');
    if (!toast) return;

    toast.innerText = message;
    toast.classList.remove("show"); // Reset animation
    clearTimeout(toastTimer);

    void toast.offsetWidth; // Force a "re-draw" for the animation to work
    toast.classList.add("show");

    toastTimer = setTimeout(() => {
        toast.classList.remove("show");
    }, 3000);
}

// 3. INITIALIZATION (Runs when page loads)
document.addEventListener("DOMContentLoaded", () => {
    if (!myId) {
        console.error("No User ID found. Please log in.");
        return;
    }
    initMessenger();

    async function fetchMyProfile() {
    try {
        const { data, error } = await _supabase
            .from('profiles')
            .select('*')
            .eq('id', myId)
            .single();

        if (data) {
            myProfileData = data;
            // This updates your "Your Story" bubble with your real PFP
            const myAvatar = document.querySelector('.user-pfp-source');
            if (myAvatar) myAvatar.src = data.avatar_url || 'https://via.placeholder.com/70';
        }
    } catch (err) {
        console.warn("Could not load user profile:", err);
    }
    }

    // Setup close button for Story Viewer

            document.getElementById('story-viewer').style.display = 'none';
        };
    }
});

async function initMessenger() {
    await loadStories();
    await loadChats();
}

// 4. STORY LOGIC (Horizontal Swiping Bar)
async function loadStories() {
    try {
        const { data: stories, error } = await _supabase
            .from('stories')
            .select('*, profiles(username, avatar_url)')
            .gt('expires_at', new Date().toISOString());

        if (error) throw error;
        renderStoryBar(stories || []);
    } catch (err) {
        console.error("Story Error:", err);
    }
}

function renderStoryBar(activeStories) {
    const storyArea = document.getElementById('stories-area');
    const mySlot = document.getElementById('my-story-slot');
    if (!storyArea || !mySlot) return;

    const myActiveStory = activeStories.find(s => s.user_id === myId);

    // YOUR STORY SLOT
    if (myActiveStory) {
        mySlot.innerHTML = `
            <div class="story-item" onclick='openStory(${JSON.stringify(myActiveStory).replace(/'/g, "&apos;")})'>
                <div class="story-avatar active-story">
                    <img src="${myActiveStory.image_url}">
                </div>
                <span class="story-name">Your story</span>
            </div>`;
    } else {
        mySlot.innerHTML = `
            <div class="story-item" onclick="showToast('Your story will appear here')">
                <div class="story-avatar add-story">
                    <img src="https://via.placeholder.com/70">
                    <div class="add-icon-badge"><i class="fa-solid fa-plus"></i></div>
                </div>
                <span class="story-name">Your story</span>
            </div>`;
    }

    // OTHER PEOPLE'S STORIES
    const otherStories = activeStories.filter(s => s.user_id !== myId);
    storyArea.innerHTML = otherStories.map(s => `
        <div class="story-item" onclick='openStory(${JSON.stringify(s).replace(/'/g, "&apos;")})'>
            <div class="story-avatar active-story">
                <img src="${s.image_url}">
            </div>
            <span class="story-name">${s.profiles?.username || 'User'}</span>
        </div>
    `).join('');
}

async function openStory(story) {
    const viewer = document.getElementById('story-viewer');
    const img = document.getElementById('story-img-display');
    const viewCountSpan = document.getElementById('view-count');
    const tracker = document.getElementById('view-tracker');

    img.src = story.image_url;
    viewer.style.display = 'flex';

    if (story.user_id === myId) {
        tracker.style.display = 'flex';
        const { count } = await _supabase.from('story_views').select('*', { count: 'exact', head: true }).eq('story_id', story.id);
        viewCountSpan.innerText = count || 0;
    } else {
        tracker.style.display = 'none';
        await _supabase.from('story_views').insert([{ story_id: story.id, viewer_id: myId }]);
    }
}

function playNotificationSound() {
    if (!pingSound) return;
    pingSound.currentTime = 0; // Reset to start
    pingSound.play().catch(error => {
        console.log("Audio playback waiting for user interaction.");
    });
}
     
// 5. CHAT LOGIC (Vertical List)
async function loadChats() {
    const chatBox = document.getElementById("chat-list-container");
    try {
        // We fetch the message AND the profiles for both sides of the conversation
        const { data: messages, error } = await _supabase
            .from('messages')
            .select(`
                *,
                sender_profile:sender_id(id, username, avatar_url),
                receiver_profile:receiver_id(id, username, avatar_url)
            `)
            .or(`sender_id.eq.${myId},receiver_id.eq.${myId}`)
            .order('created_at', { ascending: false });

        if (error) throw error;

        if (!messages || messages.length === 0) {
            chatBox.innerHTML = `<div class="empty-welcome"><i class="fa-solid fa-comment-dots"></i><h2>No messages yet</h2></div>`;
        } else {
            // Group messages so you only see ONE entry per person (the latest one)
            const groupedChats = filterUniqueChats(messages);
            renderChats(groupedChats);
        }
    } catch (error) {
        console.error("Fetch Error:", error);
        chatBox.innerHTML = `<p style="text-align:center; padding:20px;">Error loading conversations.</p>`;
    }
}

 // --- MESSENGER-SPECIFIC LISTENER ---
// This lookout doesn't just show a dot; it updates the chat list live!
const messageListener = _supabase
  .channel('public:messages_live')
  .on('postgres_changes', { 
      event: 'INSERT', 
      schema: 'public', 
      table: 'messages',
      filter: `receiver_id=eq.${myId}` 
    }, (payload) => {
        const newMessage = payload.new;
        
        // 1. Play sound
        playNotificationSound();

        // 2. If the user is currently TALKING to the person who sent the message
        if (currentChatId === newMessage.sender_id) {
            loadMessages(currentChatId); // Refresh the bubble area instantly
        } else {
            // Otherwise, just show the red dot and refresh the main list
            toggleMessengerBadge(true);
            if (typeof loadChats === "function") loadChats();
        }
    })
    
  .subscribe();   

 async function loadMessages(otherUserId) {
    const container = document.getElementById('message-container');
    container.innerHTML = '<div style="text-align:center;color:#888;">Loading history...</div>';

    const { data, error } = await _supabase
        .from('messages')
        .select('*')
        .or(`and(sender_id.eq.${myId},receiver_id.eq.${otherUserId}),and(sender_id.eq.${otherUserId},receiver_id.eq.${myId})`)
        .order('created_at', { ascending: true });

    if (error) {
        console.error("Error loading messages:", error);
        return;
    }

    container.innerHTML = ''; 
    data.forEach(msg => {
        const isMe = msg.sender_id === myId;
        const div = document.createElement('div');
        div.className = `message ${isMe ? 'sent' : 'received'}`;
        
        // 1. Format the time for the bubble
        const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        // 2. "Seen" logic: Only show status on messages I sent
        let statusHtml = '';
        if (isMe) {
            statusHtml = msg.is_read 
                ? '<span class="status-text" style="color:#4ade80;">Seen</span>' 
                : '<span class="status-text">Sent</span>';
        }

        // 3. Inject Content + Footer
        div.innerHTML = `
            <div class="msg-content">${msg.content}</div>
            <div class="msg-footer" style="display:flex; justify-content:flex-end; gap:5px; font-size:10px; margin-top:4px; opacity:0.6;">
                <span class="msg-time">${time}</span>
                ${statusHtml}
            </div>
        `;
        
        container.appendChild(div);
    });

    setTimeout(() => {
        container.scrollTop = container.scrollHeight;
    }, 100);
   }

     
    async function sendMessage() {
    const input = document.getElementById('message-input');
    const content = input.value.trim();

    if (!content || !currentChatId) return;

    // Clear input immediately for a "fast" feel
    input.value = '';

    const { error } = await _supabase
        .from('messages')
        .insert([
            { 
                sender_id: myId, 
                receiver_id: currentChatId, 
                content: content 
            }
        ]);

    if (error) {
        showToast("Failed to send message");
        console.error(error);
    } else {
        // Refresh the chat view locally
        loadMessages(currentChatId);
    }
  }
     

// Helper to ensure you don't see the same person twice in the list
function filterUniqueChats(messages) {
    const unique = new Map();
    messages.forEach(m => {
        const otherId = m.sender_id === myId ? m.receiver_id : m.sender_id;
        if (!unique.has(otherId)) {
            unique.set(otherId, m);
        }
    });
    return Array.from(unique.values());
  }

function renderChats(chatData) {
    document.getElementById("chat-list-container").innerHTML = chatData.map(chat => {
        const isMe = chat.sender_id === myId;
        const displayUser = isMe ? chat.receiver_profile : chat.sender_profile;
        
        // 1. Logic for Bold text & Blue Dot (If I am receiver and is_read is false)
        const isUnread = !isMe && chat.is_read === false;
        const textStyle = isUnread ? 'font-weight: 800; color: white;' : 'font-weight: 400; color: #bbb;';
        
        // 2. Format the Timestamp
        const time = new Date(chat.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        return `
        <div class="chat-item" onclick="openChat('${displayUser.id}', '${displayUser.username}', '${displayUser.avatar_url || 'https://via.placeholder.com/60'}')">
            <div class="chat-pfp-wrapper">
                <img src="${displayUser?.avatar_url || 'https://via.placeholder.com/60'}" class="chat-pfp">
                <!-- Blue dot appears only if unread -->
                ${isUnread ? '<span class="unread-dot"></span>' : '<span class="online-status">Now</span>'} 
            </div>
            <div class="chat-info">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>${displayUser?.username || 'User'}</h3>
                    <span class="chat-time">${time}</span>
                </div>
                <div class="chat-msg" style="${textStyle}">
                    ${isMe ? '<span style="color:var(--gt-blue);">You: </span>' : ''}
                    ${chat.content}
                </div>
            </div>
            <!-- Blue checkmark logic: Show if message is seen or successfully sent -->
            <i class="${chat.is_read ? 'fa-solid fa-circle-check' : 'fa-regular fa-circle-check'}" 
               style="color:var(--gt-blue); font-size: 12px; margin-left: 5px;"></i>
        </div>`;
    }).join('');
  }


function handleTyping() {
    if (!currentChatId) return;

    // 1. Tell the other person I AM typing
    _supabase.channel(`chat:${currentChatId}`).send({
      type: 'broadcast',
      event: 'typing',
      payload: { sender_id: myId, isTyping: true },
    });

    // 2. Reset the timer
    clearTimeout(typingTimeout);
    
    // 3. Set a fresh timer to tell them I STOPPED after 2 seconds of silence
    typingTimeout = setTimeout(() => {
        _supabase.channel(`chat:${currentChatId}`).send({
          type: 'broadcast',
          event: 'typing',
          payload: { sender_id: myId, isTyping: false },
        });
    }, 2000);
}

// 6. NEW CHAT MENU & FOLLOWING LOGIC (The Fixed Section)
function toggleNewChatMenu() {
    const menu = document.getElementById('newChatMenu');
    const isOpening = menu.style.display !== 'flex';
    menu.style.display = isOpening ? 'flex' : 'none';
    if (isOpening) switchNC('following'); 
}

async function switchNC(type) {
    const searchWrapper = document.getElementById('nc-search-wrapper');
    const listArea = document.getElementById('nc-list-content');
    const followCount = document.getElementById('following-count');
    
    // UI Update
    document.getElementById('nc-tab-following').classList.toggle('active', type === 'following');
    document.getElementById('nc-tab-recommended').classList.toggle('active', type === 'recommended');
    
    if (searchWrapper) searchWrapper.style.visibility = (type === 'following') ? 'visible' : 'hidden';
    listArea.innerHTML = '<p style="text-align:center; padding:20px; color:#888;">Searching...</p>';

    try {
        let url = type === 'following' 
            ? `${SUPABASE_URL}/rest/v1/follows?follower_id=eq.${myId}&select=profiles(*)`
            : `${SUPABASE_URL}/rest/v1/profiles?id=neq.${myId}&limit=15`;

        const res = await fetch(url, { headers: { apikey: SUPABASE_KEY } });
        const data = await res.json();
        
        const users = type === 'following' ? data.map(f => f.profiles) : data;
        if (type === 'following' && followCount) followCount.innerText = users.length;

        renderNCList(users);
        if (type === 'following') followingData = users;
    } catch (e) {
        listArea.innerHTML = '<p style="text-align:center; color:red; padding:20px;">Connection error.</p>';
    }
}

function renderNCList(users) {
    const listArea = document.getElementById('nc-list-content');
    if (users.length === 0) {
        listArea.innerHTML = '<p style="text-align:center; color:#888; padding:20px;">No users found.</p>';
        return;
    }
    listArea.innerHTML = users.map(user => `
        <div class="nc-user-item">
            <img src="${user.avatar_url || 'https://via.placeholder.com/50'}" class="nc-user-pfp">
            <span class="nc-user-name">${user.username}</span>
        </div>
    `).join('');
}

function filterFollowing(query) {
    const filtered = followingData.filter(u => u.username.toLowerCase().includes(query.toLowerCase()));
    renderNCList(filtered);
}

// 7. TAB NAVIGATION (Groups, Calls, etc.)
async function switchTab(type) {
    document.querySelectorAll('.tab').forEach(t => {
        t.classList.remove('active');
        const indicator = t.querySelector('.tab-indicator');
        if(indicator) indicator.remove();
    });

    const selected = document.getElementById(`tab-${type}`);
    selected.classList.add('active');
    selected.innerHTML += `<div class="tab-indicator"></div>`;

    const chatContainer = document.getElementById("chat-list-container");
    
    if (type === 'chats') {
        await loadChats();
    } else {
        chatContainer.innerHTML = `
            <div class="empty-welcome">
                <i class="fa-solid ${type === 'groups' ? 'fa-users' : 'fa-video'}" style="font-size: 50px; color: #f0f2f5;"></i>
                <h2 style="margin-top:15px; color:#65676b;">${type.charAt(0).toUpperCase() + type.slice(1)} coming soon</h2>
            </div>`;
    }
}

let selectedFileBlob = null;

// 1. Toggle the dropdown
document.getElementById('story-menu-trigger').onclick = (e) => {
    const dropdown = document.getElementById('story-dropdown');
    dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
};

// 2. Open file picker
function triggerFilePicker() {
    document.getElementById('story-upload-input').click();
    document.getElementById('story-dropdown').style.display = 'none';
}

// 3. Handle file selection -> Show Photo A
document.getElementById('story-upload-input').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    selectedFileBlob = file;
    document.getElementById('overlay-photo-a').style.display = 'flex';
};

// 4. Move to Photo B (Editor)
function goToPhotoB() {
    const reader = new FileReader();
    reader.onload = (event) => {
        document.getElementById('editing-preview-img').src = event.target.result;
        document.getElementById('overlay-photo-a').style.display = 'none';
        document.getElementById('overlay-photo-b').style.display = 'flex';
    };
    reader.readAsDataURL(selectedFileBlob);
}

// 5. Final Upload (Share)
async function finalUpload() {
    if (!selectedFileBlob) return;
    showToast("Sharing to story...");
    
    const filePath = `${myId}/${Date.now()}_story.jpg`;
    const { error: uploadError } = await _supabase.storage.from('story-images').upload(filePath, selectedFileBlob);

    if (uploadError) return showToast("Upload failed!");

    const { data: urlData } = _supabase.storage.from('story-images').getPublicUrl(filePath);
    await _supabase.from('stories').insert([{ 
        user_id: myId, 
        image_url: urlData.publicUrl,
        expires_at: new Date(Date.now() + 24*60*60*1000).toISOString() 
    }]);

    closeStoryFlow();
    showToast("Shared successfully!");
    setTimeout(() => location.reload(), 1000);
}

function closeStoryFlow() {
    document.querySelectorAll('.story-overlay').forEach(el => el.style.display = 'none');
    selectedFileBlob = null;
        
}

function toggleStories() {
    const storiesDiv = document.getElementById('stories-collapsible');
    const chevron = document.getElementById('stories-chevron');
    const isHidden = storiesDiv.style.display === "none";
    storiesDiv.style.display = isHidden ? "block" : "none";
    chevron.style.transform = isHidden ? "rotate(0deg)" : "rotate(-90deg)";
}
     

// 1. The function that updates the database
async function markAsRead(otherUserId) {
    try {
        const { error } = await _supabase
            .from('messages')
            .update({ is_read: true })
            .eq('receiver_id', myId) // I am the receiver
            .eq('sender_id', otherUserId) // They are the sender
            .eq('is_read', false); // Only update what isn't read yet

        if (error) throw error;

        // Refresh the sidebar list to clear bold text and blue dots
        if (typeof loadChats === "function") loadChats();
        
    } catch (error) {
        console.error("Error marking messages as read:", error);
    }
}

// 2. Updated openChat with the Handshake logic
function openChat(userId, userName, userAvatar) {
    currentChatId = userId;
    
    // Update the Name and the Avatar in the header
    document.getElementById('chat-user-name').innerText = userName;
    document.getElementById('chat-user-avatar').src = userAvatar || 'https://via.placeholder.com/40';
    
    document.getElementById('chat-overlay').style.display = 'flex';
    
    // Load the messages for this user
    loadMessages(userId);
    
    // Clear the main messenger notification badge
    toggleMessengerBadge(false); 

    // THE HANDSHAKE: Tell the DB we have seen these messages
    markAsRead(userId);
}

function closeChat() {
    document.getElementById('chat-overlay').style.display = 'none';
    currentChatId = null;
}

function handleKeyPress(e) {
    if (e.key === 'Enter') sendMessage();
  
}
