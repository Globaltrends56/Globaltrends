<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GT Messenger </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gt-blue: #0078FF;
            --bg-white: #ffffff;
            --text-main: #000000;
            --text-muted: #65676b;
            --border-light: #f0f2f5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg-white); color: var(--text-main); overflow-x: hidden; }

        /* HEADER (Matched to Image) */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; position: sticky; top: 0; background: #fff; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 35px; height: 35px; }
        .header-left h1 { 
            font-size: 22px; /* Slightly smaller to fit mobile screens */
            font-weight: 800; 
            color: var(--gt-blue); 
            letter-spacing: -0.5px;
            white-space: nowrap; /* Forces "GT Messenger" to stay on one line */
        }

       /* 1. The Main Container - Pushes Left and Right apart */
       .header-right { 
            display: flex; 
            gap: 12px; /* Reduced gap between the two buttons */
            align-items: center; 
        }

        .top-action { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 2px; /* Tighter space between icon and text */
            cursor: pointer; 
            position: relative;
            min-width: 50px; /* Ensures consistent spacing */
        }

        .top-action .icon-bg { 
            width: 36px; /* Reduced from 45px */
            height: 36px; /* Reduced from 45px */
            background: #f0f2f5; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 16px; /* Smaller icon size */
            color: #000;
        }

        .top-action span { 
            font-size: 10px; /* Smaller text label */
            font-weight: 600; 
            color: #000;
        }

        /* Adjust the badge size for the smaller icon */
        .badge { 
            position: absolute; 
            top: -3px; 
            right: 4px; 
            background: #ff3b30; 
            color: #fff; 
            font-size: 9px; 
            padding: 1px 4px; 
            border-radius: 10px; 
            border: 1.5px solid #fff; 
        }
        
        /* STORIES SECTION */
        .section-title { padding: 0px 20px 5px; font-size: 15px; font-weight: 700; }
        .stories-wrapper { display: flex; gap: 15px; padding: 0 20px 5px; overflow-x: auto; scrollbar-width: none; min-height: 85px; align-items: center; }
        .stories-wrapper::-webkit-scrollbar { display: none; }
        .story-hint { font-size: 12px; color: var(--text-muted); font-style: italic; }

        .story-item { display: flex; flex-direction: column; align-items: center; min-width: 75px; gap: 8px; }
        .story-avatar { width: 70px; height: 70px; border-radius: 50%; padding: 3px; border: 3px solid var(--gt-blue); }
        .story-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #fff; }

/* TABS */
.tabs {
    display: flex;
    justify-content: space-between;
    align-items: center;
    
    /* 1. The Break-Out Logic */
    width: calc(100% + 40px); /* Adds back the space lost to container padding */
    margin-left: -20px;       /* Pulls it to the far left edge */
    margin-right: -20px;      /* Pulls it to the far right edge */
    
    /* 2. Internal Spacing */
    /* 15px here acts as a new 'safe zone' so text doesn't touch the glass */
    padding: 0 15px 10px; 
    
    /* 3. Positioning & Visuals */
    border-bottom: 1px solid var(--border-light);
    background: #fff;
    position: sticky;
    top: 70px; 
    z-index: 900;
    box-sizing: border-box; 
}

.tab {
    flex: 1; /* This forces each tab to take up exactly 33.3% of the width */
    text-align: center;
    padding: 12px 0; /* Slightly more vertical padding for a better hit area */
    cursor: pointer;
    color: #8e8e8e;
    font-size: 15px; /* Slightly larger for readability */
    font-weight: 600;
    transition: all 0.2s ease;
}

.tab.active {
    color: var(--gt-blue);
    font-weight: 800; /* Bold for the active state */
}
        
        /* CHAT LIST LAYOUT (The Vertical Illustration) */
        .chat-list { padding: 0px 20px; }
        .chat-item { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid transparent; }
        .chat-pfp-wrapper { position: relative; }
        .chat-pfp { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        .online-status { position: absolute; bottom: 2px; right: 2px; background: #4cd964; color: #000; font-size: 10px; font-weight: bold; padding: 1px 4px; border-radius: 10px; border: 2px solid #fff; }

        .chat-info { flex: 1; }
        .chat-info h3 { font-size: 17px; font-weight: 700; }
        .chat-msg { font-size: 14px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .unread-indicator { width: 18px; height: 18px; background: #ff3b30; color: #fff; font-size: 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* EMPTY STATE */
        .empty-welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 120px; color: var(--text-muted); text-align: center; }
        .empty-welcome i { font-size: 60px; color: var(--border-light); margin-bottom: 15px; }
        /* Floating Action Button Container */
.fab-container {
    position: fixed;
    bottom: 25px; /* Distance from bottom */
    right: 25px;  /* Distance from right */
    z-index: 2000; /* Keeps it on top of everything */
}

/* The actual Blue Button */
.fab-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background-color: var(--gt-blue); /* Uses your existing blue variable */
    color: #ffffff;
    border: none;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(0, 120, 255, 0.4); /* Soft blue glow */
    cursor: pointer;
    transition: transform 0.2s, background-color 0.2s;
}

/* Hover & Click Effects */
.fab-btn:hover {
    background-color: #006ae6; /* Slightly darker on hover */
    transform: scale(1.05);    /* Slight grow effect */
}

.fab-btn:active {
    transform: scale(0.95);    /* Slight shrink when pressed */
    }

    /* FAB & Overlay Styles */
.fab-container { position: fixed; bottom: 25px; right: 25px; z-index: 2000; }
.fab-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--gt-blue); color: #fff; border: none; font-size: 24px; box-shadow: 0 4px 15px rgba(0,120,255,0.4); cursor: pointer; }

.new-chat-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); z-index: 2100;
    display: none; align-items: flex-end;
}

.new-chat-card {
    width: 100%; height: 85vh; background: #fff;
    border-radius: 25px 25px 0 0; display: flex; flex-direction: column;
    animation: slideUp 0.3s ease-out;
}

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

/* Header & Search */
.nc-header { padding: 15px 20px; border-bottom: 1px solid var(--border-light); }
.nc-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.nc-nav { display: flex; gap: 20px; }
.nc-tab { font-size: 14px; font-weight: 700; color: #888; cursor: pointer; position: relative; padding-bottom: 5px; }
.nc-tab.active { color: var(--gt-blue); border-bottom: 3px solid var(--gt-blue); }
.nc-count { font-size: 11px; background: #f0f2f5; padding: 2px 8px; border-radius: 10px; color: #555; }

.nc-search-container {
    background: #f0f2f5; border-radius: 10px; padding: 8px 15px;
    display: flex; align-items: center; gap: 10px;
}
.nc-search-container input {
    background: none; border: none; outline: none; width: 100%; font-size: 14px;
}

/* Scroll Area */
.nc-body { flex: 1; overflow-y: auto; padding: 10px 20px; }
.nc-user-item { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
.nc-user-pfp { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
.nc-user-name { font-weight: 600; font-size: 15px; }    

/* The Plus Badge style */
.story-avatar.add-story {
    position: relative;
    border: 3px solid #f0f2f5 !important;
}

.add-icon-badge {
    position: absolute;
    bottom: 0;
    right: 0;
    background: var(--gt-blue);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 10px;
}

/* The style for when YOU have an active story */
.story-avatar.active-story {
    border: 3px solid var(--gt-blue) !important;
}
/* The class that hides the stories */
.stories-hidden {
    display: none !important;
}

/* Rotate chevron when closed */
.chevron-rotate {
    transform: rotate(-90deg);
}

/* Ensure the layout shifts smoothly */
#stories-collapsible {
    transition: all 0.3s ease;
    overflow: hidden;
}
  </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/be/Facebook_Messenger_logo_2020.svg" class="logo-img">
            <h1>GT Messenger</h1>
        </div>
        <div class="header-right">
            <div class="top-action">
                <div class="icon-bg"><i class="fa-solid fa-plus"></i></div>
                <span>STORY</span>
            </div>
            <div class="top-action">
                <div class="icon-bg"><i class="fa-solid fa-gear"></i></div>
                <span class="badge">1</span>
                <span>MENU</span>
            </div>
        </div>
    </header>

    <div class="section-title" onclick="toggleStories()" style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
    Stories
    <i class="fa-solid fa-chevron-down" id="stories-chevron" style="transition: transform 0.3s ease; font-size: 14px; color: #888;"></i>
</div>

<div id="stories-collapsible">
    <div class="stories-wrapper">
        <div id="my-story-slot">
            <div class="story-item" onclick="openAddStory()">
                <div class="story-avatar add-story">
                    <img src="https://via.placeholder.com/70" class="user-pfp-source">
                    <div class="add-icon-badge"><i class="fa-solid fa-plus"></i></div>
                </div>
                <span class="story-name">Your story</span>
            </div>
        </div>

        <div id="stories-area" style="display: flex; gap: 15px;"></div>
    </div>
</div>

    <div class="tabs">
    <div id="tab-chats" class="tab active" onclick="switchTab('chats')">
        Chats
        <div class="tab-indicator"></div>
    </div>
    
    <div id="tab-groups" class="tab inactive" onclick="switchTab('groups')">Groups</div>
    <div id="tab-calls" class="tab inactive" onclick="switchTab('calls')">Calls</div>
    </div>

    <div class="chat-list" id="chat-list-container">
        </div>
    <div class="fab-container">
    <button class="fab-btn" onclick="toggleNewChatMenu()">
        <i class="fa-solid fa-plus"></i>
    </button>
</div>

<div class="new-chat-overlay" id="newChatMenu">
    <div class="new-chat-card">
        <div class="nc-header">
            <div class="nc-top-row">
                <div class="nc-nav">
                    <div class="nc-tab active" id="nc-tab-following" onclick="switchNC('following')">
                        Following <span class="nc-count" id="following-count">0</span>
                    </div>
                    <div class="nc-tab" id="nc-tab-recommended" onclick="switchNC('recommended')">
                        People you may know
                    </div>
                </div>
                <button class="nc-close" onclick="toggleNewChatMenu()">&times;</button>
            </div>
            
            <div class="nc-search-container" id="nc-search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="nc-search-input" placeholder="Search friends..." oninput="filterFollowing(this.value)">
            </div>
        </div>

        <div class="nc-body" id="nc-scroll-area">
            <div id="nc-list-content">
                </div>
        </div>
    </div>
</div>

    <script>
        const SUPABASE_URL = "https://spnvgymmrlyqtfrbjjsg.supabase.co";
        const SUPABASE_KEY = "YOUR_KEY_HERE";
        const myId = localStorage.getItem("user_id")?.replace(/['"]+/g, '');
        let followingData = [];

        document.addEventListener("DOMContentLoaded", () => {
            if (!myId) return;
            initMessenger();
        });

    async function initMessenger() {
    const interests = JSON.parse(localStorage.getItem("my_interests")) || [];
    const yesterday = new Date(Date.now() - 24*60*60*1000).toISOString();

    // 1. STORIES LOGIC
    const storyRes = await fetch(`${SUPABASE_URL}/rest/v1/stories?select=*,profiles(username,avatar_url)&created_at=gt.${yesterday}`, {
        headers: { apikey: SUPABASE_KEY }
    });
    const allStories = await storyRes.json();
    const followedStories = allStories.filter(s => interests.includes(s.user_id));

    const storyBox = document.getElementById("stories-area");
    if (followedStories.length === 0) {
        storyBox.innerHTML = `<span class="story-hint">Stories appears here</span>`;
    } else {
        renderStories(followedStories);
    }

    // 2. CHAT LOGIC
    const chatBox = document.getElementById("chat-list-container");
    chatBox.innerHTML = ""; 

    try {
        const msgRes = await fetch(`${SUPABASE_URL}/rest/v1/messages?or=(sender_id.eq.${myId},receiver_id.eq.${myId})&limit=1`, {
            headers: { apikey: SUPABASE_KEY }
        });
        const messages = await msgRes.json();

        if (!messages || messages.length === 0) {
            chatBox.innerHTML = `<div class="empty-welcome"><i class="fa-solid fa-comment-dots"></i><h2>Start new chat</h2></div>`;
        } else {
            renderChats(messages); 
        }
    } catch (error) {
        console.error("Error:", error);
    }
} // <--- Make sure this brace closes the WHOLE function
        

        function renderStories(data) {
    // 1. Check if the logged-in user (myId) has a story in the data
    const myActiveStory = data.find(s => s.user_id === myId);
    const mySlot = document.getElementById("my-story-slot");

    if (myActiveStory) {
        // Change Slot to "View My Story" mode
        mySlot.innerHTML = `
            <div class="story-item" onclick="viewMyStory()">
                <div class="story-avatar active-story">
                    <img src="${myActiveStory.profiles.avatar_url}">
                </div>
                <span class="story-name">Your story</span>
            </div>`;
    } else {
        // Keep Slot in "Add Story" mode (Standard placeholder)
        mySlot.innerHTML = `
            <div class="story-item" onclick="openAddStory()">
                <div class="story-avatar add-story">
                    <img src="https://via.placeholder.com/70" class="user-pfp-source">
                    <div class="add-icon-badge"><i class="fa-solid fa-plus"></i></div>
                </div>
                <span class="story-name">Your story</span>
            </div>`;
    }

    // 2. Filter out your own story from the "Others" list so it doesn't show twice
    const others = data.filter(s => s.user_id !== myId);
    const users = [...new Map(others.map(s => [s.user_id, s])).values()];
    
    document.getElementById("stories-area").innerHTML = users.map(u => `
        <div class="story-item">
            <div class="story-avatar"><img src="${u.profiles.avatar_url}"></div>
            <span class="story-name">${u.profiles.username}</span>
        </div>
    `).join('');
}

// Functions for the different states
function viewMyStory() { alert("Viewing your story..."); }
function openAddStory() { alert("Opening upload section..."); }

        // THIS IS THE ILLUSTRATION LAYOUT (Applied to real data)
        function renderChats(chatData) {
            document.getElementById("chat-list-container").innerHTML = chatData.map(chat => {
                const isUnread = false; // Add logic based on your message status
                return `
                <div class="chat-item">
                    <div class="chat-pfp-wrapper">
                        <img src="${chat.profiles.avatar_url}" class="chat-pfp">
                        <span class="online-status">Now</span> 
                    </div>
                    <div class="chat-info">
                        <h3>${chat.profiles.username}</h3>
                        <div class="chat-msg">
                            ${isUnread ? '<span class="unread-indicator">1</span>' : ''}
                            ${chat.last_message || 'No message yet'}
                        </div>
                    </div>
                    <i class="fa-regular fa-circle-check" style="color:var(--gt-blue)"></i>
                </div>`;
            }).join('');
        }
        

     async function switchTab(type) {
    // 1. Visual Update: Move the blue line and change colors
    document.querySelectorAll('.tab').forEach(t => {
        t.classList.remove('active');
        t.classList.add('inactive');
        const oldIndicator = t.querySelector('.tab-indicator');
        if (oldIndicator) oldIndicator.remove();
    });

    const selectedTab = document.getElementById(`tab-${type}`);
    selectedTab.classList.add('active');
    selectedTab.classList.remove('inactive');
    selectedTab.innerHTML += `<div class="tab-indicator"></div>`;

    // 2. Logic Update: Clear the screen first so old messages don't stay
    const chatContainer = document.getElementById("chat-list-container");
    chatContainer.innerHTML = `<div style="text-align:center; padding:50px;">Loading...</div>`;

    // 3. Re-fill the container based on the tab
    if (type === 'chats') {
        // This MUST call your main function to check for messages again
        await initMessenger(); 
    } else if (type === 'groups') {
        chatContainer.innerHTML = `
            <div class="empty-welcome">
                <i class="fa-solid fa-users" style="font-size: 50px; color: #f0f2f5;"></i>
                <h2 style="margin-top:15px; color:#65676b;">Groups coming soon</h2>
            </div>`;
    } else if (type === 'calls') {
        chatContainer.innerHTML = `
            <div class="empty-welcome">
                <i class="fa-solid fa-video" style="font-size: 50px; color: #f0f2f5;"></i>
                <h2 style="margin-top:15px; color:#65676b;">Video calls coming soon</h2>
            </div>`;
    }
  }
        
function toggleNewChatMenu() {
    const menu = document.getElementById('newChatMenu');
    const isOpen = menu.style.display === 'flex';
    menu.style.display = isOpen ? 'none' : 'flex';
    if (!isOpen) switchNC('following'); 
}

async function switchNC(type) {
    const searchWrapper = document.getElementById('nc-search-wrapper');
    const listArea = document.getElementById('nc-list-content');
    
    // UI Update
    document.getElementById('nc-tab-following').classList.toggle('active', type === 'following');
    document.getElementById('nc-tab-recommended').classList.toggle('active', type === 'recommended');
    
    // Only show search box for Following
    searchWrapper.style.visibility = (type === 'following') ? 'visible' : 'hidden';
    listArea.innerHTML = '<p style="text-align:center; padding:20px;">Loading...</p>';

    try {
        if (type === 'following') {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/follows?follower_id=eq.${myId}&select=profiles(*)`, {
                headers: { apikey: SUPABASE_KEY }
            });
            const data = await res.json();
            followingData = data.map(f => f.profiles); // Save to state
            document.getElementById('following-count').innerText = followingData.length;
            renderNCList(followingData);
        } else {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=neq.${myId}&limit=15`, {
                headers: { apikey: SUPABASE_KEY }
            });
            const recData = await res.json();
            renderNCList(recData);
        }
    } catch (e) {
        listArea.innerHTML = '<p>Error loading users.</p>';
    }
}

// Function to render the scrollable list
function renderNCList(users) {
    const listArea = document.getElementById('nc-list-content');
    if (users.length === 0) {
        listArea.innerHTML = '<p style="text-align:center; color:#888; padding:20px;">No one found.</p>';
        return;
    }
    listArea.innerHTML = users.map(user => `
        <div class="nc-user-item" onclick="startNewChat('${user.id}')">
            <img src="${user.avatar_url || 'https://via.placeholder.com/50'}" class="nc-user-pfp">
            <span class="nc-user-name">${user.username}</span>
        </div>
    `).join('');
}

// Search Filtering Logic (Following only)
function filterFollowing(query) {
    const filtered = followingData.filter(user => 
        user.username.toLowerCase().includes(query.toLowerCase())
    );
    renderNCList(filtered);
    }

    function toggleStories() {
    const storiesDiv = document.getElementById('stories-collapsible');
    const chevron = document.getElementById('stories-chevron');
    
    // Logic: If it's hidden, show it. If it's shown, hide it.
    if (storiesDiv.style.display === "none") {
        storiesDiv.style.display = "block";
        chevron.style.transform = "rotate(0deg)"; // Points down
    } else {
        storiesDiv.style.display = "none";
        chevron.style.transform = "rotate(-90deg)"; // Points right
    }
    }
    </script>
    <div class="fab-container">
    <button class="fab-btn" onclick="toggleNewChatMenu()">
        <i class="fa-solid fa-plus"></i>
    </button>
    </div>
</body>
</html>
