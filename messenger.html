<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GT Messenger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gt-blue: #0078FF;
            --bg-white: #ffffff;
            --text-main: #000000;
            --text-muted: #65676b;
            --border-light: #f0f2f5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg-white); color: var(--text-main); overflow-x: hidden; }

        /* HEADER (Matched to Image) */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; position: sticky; top: 0; background: #fff; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 45px; height: 45px; }
        .header-left h1 { font-size: 26px; font-weight: 800; color: var(--gt-blue); letter-spacing: -0.5px; }

        .header-right { display: flex; gap: 20px; }
        .top-action { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; position: relative; }
        .top-action .icon-bg { width: 45px; height: 45px; background: #f0f2f5; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .top-action span { font-size: 11px; font-weight: 500; }
        .badge { position: absolute; top: -2px; right: -2px; background: #ff3b30; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 2px solid #fff; }

        /* STORIES SECTION */
        .section-title { padding: 10px 20px; font-size: 15px; font-weight: 700; }
        .stories-wrapper { display: flex; gap: 15px; padding: 0 20px 15px; overflow-x: auto; scrollbar-width: none; min-height: 100px; align-items: center; }
        .stories-wrapper::-webkit-scrollbar { display: none; }
        .story-hint { font-size: 12px; color: var(--text-muted); font-style: italic; }

        .story-item { display: flex; flex-direction: column; align-items: center; min-width: 75px; gap: 8px; }
        .story-avatar { width: 70px; height: 70px; border-radius: 50%; padding: 3px; border: 3px solid var(--gt-blue); }
        .story-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #fff; }

        /* TABS */
        .tabs { display: flex; justify-content: space-between; padding: 10px 25px; border-bottom: 1px solid var(--border-light); }
        .tab { font-size: 22px; font-weight: 800; position: relative; cursor: pointer; }
        .tab-indicator { width: 30px; height: 4px; background: var(--gt-blue); border-radius: 10px; position: absolute; bottom: -8px; left: 0; }
        .tab.inactive { color: #888; font-size: 18px; margin-top: 3px; }

        /* CHAT LIST LAYOUT (The Vertical Illustration) */
        .chat-list { padding: 10px 20px; }
        .chat-item { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid transparent; }
        .chat-pfp-wrapper { position: relative; }
        .chat-pfp { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        .online-status { position: absolute; bottom: 2px; right: 2px; background: #4cd964; color: #000; font-size: 10px; font-weight: bold; padding: 1px 4px; border-radius: 10px; border: 2px solid #fff; }

        .chat-info { flex: 1; }
        .chat-info h3 { font-size: 17px; font-weight: 700; }
        .chat-msg { font-size: 14px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .unread-indicator { width: 18px; height: 18px; background: #ff3b30; color: #fff; font-size: 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* EMPTY STATE */
        .empty-welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 120px; color: var(--text-muted); text-align: center; }
        .empty-welcome i { font-size: 60px; color: var(--border-light); margin-bottom: 15px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/be/Facebook_Messenger_logo_2020.svg" class="logo-img">
            <h1>GT Messenger</h1>
        </div>
        <div class="header-right">
            <div class="top-action">
                <div class="icon-bg"><i class="fa-solid fa-plus"></i></div>
                <span>Add story</span>
            </div>
            <div class="top-action">
                <div class="icon-bg"><i class="fa-solid fa-gear"></i></div>
                <span class="badge">1</span>
                <span>Menu</span>
            </div>
        </div>
    </header>

    <div class="section-title">Stories</div>
    <div class="stories-wrapper" id="stories-area">
        </div>

    <div class="tabs">
        <div class="tab">Chats<div class="tab-indicator"></div></div>
        <div class="tab inactive">Groups</div>
        <div class="tab inactive">Calls</div>
    </div>

    <div class="chat-list" id="chat-list-container">
        </div>

    <script>
        const SUPABASE_URL = "https://spnvgymmrlyqtfrbjjsg.supabase.co";
        const SUPABASE_KEY = "YOUR_KEY_HERE";
        const myId = localStorage.getItem("user_id")?.replace(/['"]+/g, '');

        document.addEventListener("DOMContentLoaded", () => {
            if (!myId) return;
            initMessenger();
        });

        async function initMessenger() {
            const interests = JSON.parse(localStorage.getItem("my_interests")) || [];
            const yesterday = new Date(Date.now() - 24*60*60*1000).toISOString();

            // 1. STORIES LOGIC
            const storyRes = await fetch(`${SUPABASE_URL}/rest/v1/stories?select=*,profiles(username,avatar_url)&created_at=gt.${yesterday}`, {
                headers: { apikey: SUPABASE_KEY }
            });
            const allStories = await storyRes.json();
            const followedStories = allStories.filter(s => interests.includes(s.user_id));

            const storyBox = document.getElementById("stories-area");
            if (followedStories.length === 0) {
                storyBox.innerHTML = `<span class="story-hint">Stories appears here</span>`;
            } else {
                renderStories(followedStories);
            }

            // 2. CHAT LOGIC
            const msgRes = await fetch(`${SUPABASE_URL}/rest/v1/messages?or=(sender_id.eq.${myId},receiver_id.eq.${myId})&limit=1`, {
                headers: { apikey: SUPABASE_KEY }
            });
            const messages = await msgRes.json();

            const chatBox = document.getElementById("chat-list-container");
            if (messages.length === 0) {
                chatBox.innerHTML = `
                    <div class="empty-welcome">
                        <i class="fa-solid fa-comment-dots"></i>
                        <h2>Start new chat</h2>
                    </div>`;
            } else {
                // When you have real data, this function runs
                renderChats(messages); 
            }
        }

        function renderStories(data) {
            const users = [...new Map(data.map(s => [s.user_id, s])).values()];
            document.getElementById("stories-area").innerHTML = users.map(u => `
                <div class="story-item">
                    <div class="story-avatar"><img src="${u.profiles.avatar_url}"></div>
                    <span class="story-name">${u.profiles.username}</span>
                </div>
            `).join('');
        }

        // THIS IS THE ILLUSTRATION LAYOUT (Applied to real data)
        function renderChats(chatData) {
            document.getElementById("chat-list-container").innerHTML = chatData.map(chat => {
                const isUnread = false; // Add logic based on your message status
                return `
                <div class="chat-item">
                    <div class="chat-pfp-wrapper">
                        <img src="${chat.profiles.avatar_url}" class="chat-pfp">
                        <span class="online-status">Now</span> 
                    </div>
                    <div class="chat-info">
                        <h3>${chat.profiles.username}</h3>
                        <div class="chat-msg">
                            ${isUnread ? '<span class="unread-indicator">1</span>' : ''}
                            ${chat.last_message || 'No message yet'}
                        </div>
                    </div>
                    <i class="fa-regular fa-circle-check" style="color:var(--gt-blue)"></i>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
