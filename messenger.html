<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GT Messenger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --gt-blue: #0078FF;
            --bg-white: #ffffff;
            --text-main: #000000;
            --text-muted: #65676b;
            --border-light: #f0f2f5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg-white ); color: var(--text-main); overflow-x: hidden; }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 8px 18px;
            position: sticky; 
            top: 0; 
            background: #fff; 
            z-index: 1000; 
            border-bottom: 1px solid #f0f2f5;
        }
        
        .header-left { display: flex; align-items: center; gap: 0px; }
        .header-left h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--gt-blue);
            letter-spacing: -0.3px;
            margin: 0;
            padding-left: 5px;
        }

        .header-right { 
            display: flex; 
            gap: 12px;
            align-items: center; 
        }

        .top-action { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 2px;
            cursor: pointer; 
            position: relative;
            min-width: 50px;
        }

        .top-action .icon-bg { 
            width: 30px;
            height: 30px;
            background: #f0f2f5; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 14px;
            color: #000;
            transition: all 0.2s ease;
        }

        .top-action:hover .icon-bg {
            background: #e4e6eb;
            transform: scale(1.05);
        }

        .top-action span { 
            font-size: 9px;
            font-weight: 600; 
            color: #000;
        }
        
        .section-title { padding: 0px 20px 5px; font-size: 15px; font-weight: 700; }
        .stories-wrapper { display: flex; gap: 15px; padding: 0 20px 5px; overflow-x: auto; scrollbar-width: none; min-height: 85px; align-items: center; }
        .stories-wrapper::-webkit-scrollbar { display: none; }
        .story-item { display: flex; flex-direction: column; align-items: center; min-width: 75px; gap: 8px; cursor: pointer; }
        .story-avatar { width: 70px; height: 70px; border-radius: 50%; padding: 3px; border: 3px solid var(--gt-blue); }
        .section-title { margin-top: 18px !important; margin-bottom: 10px; }

        .tabs {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: calc(100% + 64px);
            margin-left: -32px;
            margin-right: -32px;
            padding: 0 5px 10px; 
            border-bottom: 1px solid var(--border-light);
            background: #fff;
            position: sticky;
            top: 70px; 
            z-index: 900;
            box-sizing: border-box; 
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            cursor: pointer;
            color: #8e8e8e;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .tab.active {
            color: var(--gt-blue);
            font-weight: 800;
        }
        
        .chat-list { padding: 0px 20px; }
        .chat-item { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid transparent; cursor: pointer; transition: all 0.2s ease; }
        .chat-item:hover { background: #f0f2f5; border-radius: 8px; padding-left: 8px; }
        .chat-pfp-wrapper { position: relative; }
        .chat-pfp { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        .online-status { position: absolute; bottom: 2px; right: 2px; background: #4cd964; color: #000; font-size: 10px; font-weight: bold; padding: 1px 4px; border-radius: 10px; border: 2px solid #fff; }

        .chat-info { flex: 1; }
        .chat-info h3 { font-size: 17px; font-weight: 700; }
        .chat-msg { font-size: 14px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }

        .empty-welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 120px; color: var(--text-muted); text-align: center; }
        .empty-welcome i { font-size: 60px; color: var(--border-light); margin-bottom: 15px; }
        
        .fab-container {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 2000;
        }

        .fab-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--gt-blue);
            color: #ffffff;
            border: none;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 120, 255, 0.4);
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .fab-btn:hover {
            background-color: #006ae6;
            transform: scale(1.05);
        }

        .fab-btn:active {
            transform: scale(0.95);
        }

        .new-chat-overlay {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.5); 
            z-index: 1500;
            display: none; 
            align-items: flex-end;
            pointer-events: none;
        }

        .new-chat-overlay.active {
            pointer-events: auto;
        }

        .new-chat-card {
            width: 100%; 
            height: 85vh; 
            background: #fff;
            border-radius: 25px 25px 0 0; 
            display: flex; 
            flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { 
            from { transform: translateY(100%); } 
            to { transform: translateY(0); } 
        }

        .nc-header { padding: 15px 20px; border-bottom: 1px solid var(--border-light); }
        .nc-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nc-nav { display: flex; gap: 20px; }
        .nc-tab { font-size: 14px; font-weight: 700; color: #888; cursor: pointer; position: relative; padding-bottom: 5px; transition: all 0.2s ease; }
        .nc-tab:hover { color: var(--gt-blue); }
        .nc-tab.active { color: var(--gt-blue); border-bottom: 3px solid var(--gt-blue); }
        .nc-count { font-size: 11px; background: #f0f2f5; padding: 2px 8px; border-radius: 10px; color: #555; }

        .nc-search-container {
            background: #f0f2f5; 
            border-radius: 10px; 
            padding: 8px 15px;
            display: flex; 
            align-items: center; 
            gap: 10px;
        }

        .nc-search-container input {
            background: none; 
            border: none; 
            outline: none; 
            width: 100%; 
            font-size: 14px;
        }

        .nc-body { flex: 1; overflow-y: auto; padding: 10px 20px; }

        .nc-close {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: #000;
            padding: 5px 10px;
            transition: all 0.2s ease;
        }

        .nc-close:hover {
            color: var(--gt-blue);
            transform: scale(1.1);
        }

        .nc-close:active {
            transform: scale(0.95);
        }

        .story-avatar.active-story {
            border: 3px solid var(--gt-blue) !important;
            padding: 2px;
            background: #fff;
            display: flex;
        }

        .story-avatar.no-story {
            border: 3px solid #e4e6eb !important;
            padding: 2px;
            background: #fff;
            position: relative;
        }

        .add-icon-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: var(--gt-blue);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
            z-index: 10;
        }

        .story-item span {
            font-size: 12px;
            font-weight: 500;
            color: #000;
            max-width: 75px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .story-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fff;
        }

        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 12px 22px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            z-index: 999999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        #toast-container.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .story-overlay {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: white; 
            z-index: 3000;
            display: none; 
            flex-direction: column;
        }

        .editor-bg { background: #000; }

        .editor-top {
            display: flex; 
            justify-content: space-between; 
            padding: 20px;
            position: absolute; 
            top: 0; 
            width: 100%; 
            z-index: 10;
        }

        .share-btn {
            background: var(--gt-blue); 
            color: white; 
            border: none;
            padding: 8px 20px; 
            border-radius: 5px; 
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .share-btn:hover {
            background: #006ae6;
        }

        .share-btn:active {
            transform: scale(0.95);
        }

        .editor-action { 
            color: white; 
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .editor-action:hover {
            opacity: 0.7;
        }

        #editing-preview-img {
            width: 100%; 
            height: 100%; 
            object-fit: cover;
        }

        .chat-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        .chat-header {
            padding: 15px;
            background: #111;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header i { 
            cursor: pointer; 
            font-size: 20px;
            transition: all 0.2s ease;
        }

        .chat-header i:hover {
            color: var(--gt-blue);
        }

        .header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #333;
        }

        .chat-user-info { display: flex; flex-direction: column; }
        #chat-user-name { font-weight: bold; color: white; }
        .status-dot { font-size: 11px; color: #4ade80; }

        .message-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
        }

        .message.sent {
            align-self: flex-end;
            background: #007bff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: #333;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .msg-content {
            word-wrap: break-word;
            margin-bottom: 2px;
        }

        .msg-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .msg-time { color: #eee; }

        .status-text {
            color: #4ade80;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chat-input-bar {
            padding: 15px;
            background: #111;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-bar input {
            flex: 1;
            background: #222;
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            outline: none;
        }

        .chat-input-bar button {
            background: var(--gt-blue);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .chat-input-bar button:hover {
            background: #006ae6;
            transform: scale(1.05);
        }

        .chat-input-bar button:active {
            transform: scale(0.95);
        }

        .unread-dot {
            position: absolute;
            top: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background: #007bff;
            border-radius: 50%;
            border: 2px solid #000;
            z-index: 5;
        }

        .chat-time {
            font-size: 11px;
            color: #666;
        }

        /* USER ROW STYLING */
        .user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f2f5;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .user-row:hover {
            background: #f9f9f9;
            border-radius: 8px;
            padding-left: 8px;
            padding-right: 8px;
        }

        .user-row-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .user-row-left img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-info-name {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #000;
            font-weight: 600;
            font-size: 15px;
        }

        .user-info-bio {
            font-size: 13px;
            color: #65676b;
            margin-top: 2px;
        }

        .user-row-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .action-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 18px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10;
            position: relative;
        }

        .action-btn.follow {
            background: var(--gt-blue);
            color: white;
        }

        .action-btn.follow:hover {
            background: #006ae6;
            transform: scale(1.05);
        }

        .action-btn.follow:active {
            transform: scale(0.95);
        }

        .action-btn.unfollow {
            background: #e4e6eb;
            color: #000;
        }

        .action-btn.unfollow:hover {
            background: #ccc;
            transform: scale(1.05);
        }

        .action-btn.unfollow:active {
            transform: scale(0.95);
        }

        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #story-viewer {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 10000; 
            display: none;
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }

        #close-story {
            position: absolute; 
            top: 20px; 
            right: 25px; 
            font-size: 40px; 
            color: white; 
            cursor: pointer; 
            font-family: sans-serif; 
            line-height: 1;
            transition: all 0.2s ease;
        }

        #close-story:hover {
            transform: scale(1.1);
            opacity: 0.7;
        }

        #view-tracker {
            display: none; 
            position: absolute; 
            bottom: 30px; 
            background: rgba(255,255,255,0.15); 
            backdrop-filter: blur(10px); 
            padding: 8px 15px; 
            border-radius: 20px; 
            color: white; 
            align-items: center; 
            gap: 8px; 
            font-family: sans-serif; 
            font-size: 14px;
        }

        #viewers-list {
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
        }
     </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <h1>GT Messenger</h1>
            <img class="user-pfp-source" src="https://via.placeholder.com/70" style="display:none;">
        </div>
        <div class="header-right">
            <input type="file" id="story-upload-input" accept="image/*" style="display: none;">

            <div class="top-action" id="story-menu-trigger" style="position: relative;">
                <div class="icon-bg"><i class="fa-solid fa-plus"></i></div>
                <span>STORY</span>
                
                <div id="story-dropdown" class="story-dropdown-content" style="display: none; position: absolute; top: 45px; right: 0; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.15 ); border-radius: 10px; width: 150px; z-index: 2001;">
                    <div class="dropdown-item" onclick="triggerFilePicker()" style="padding: 12px; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; cursor: pointer;">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                        <span>Add to story</span>
                    </div>
                </div>
            </div>

            <div class="top-action">
                <div class="icon-bg"><i class="fa-solid fa-gear"></i></div>
                <span>MENU</span>
            </div>
        </div>
    </header>

    <div class="section-title" onclick="toggleStories()" style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
        Stories
        <i class="fa-solid fa-chevron-down" id="stories-chevron" style="transition: transform 0.3s ease; font-size: 14px; color: #888;"></i>
    </div>

    <div id="stories-collapsible">
        <div class="stories-wrapper">
            <div id="my-story-slot"></div>
            <div id="stories-area" style="display: flex; gap: 15px;"></div>
        </div>
    </div> 
    
    <div class="tabs">
        <div id="tab-chats" class="tab active" onclick="switchTab('chats')">Chats</div>
        <div id="tab-groups" class="tab" onclick="switchTab('groups')">Groups</div>
        <div id="tab-calls" class="tab" onclick="switchTab('calls')">Calls</div>
    </div>

    <div class="chat-list" id="chat-list-container"></div>

    <div class="fab-container">
        <button class="fab-btn" onclick="toggleNewChatMenu()">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <div class="new-chat-overlay" id="newChatMenu">
        <div class="new-chat-card">
            <div class="nc-header">
                <div class="nc-top-row">
                    <div class="nc-nav">
                        <div class="nc-tab active" id="nc-tab-following" onclick="switchNC('following')">
                            Following <span class="nc-count" id="following-count">0</span>
                        </div>
                        <div class="nc-tab" id="nc-tab-recommended" onclick="switchNC('recommended')">
                            People you may know
                        </div>
                    </div>
                    <button class="nc-close" onclick="toggleNewChatMenu()">&times;</button>
                </div>
                
                <div class="nc-search-container" id="nc-search-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="nc-search-input" placeholder="Search friends..." oninput="filterFollowing(this.value)">
                </div>
            </div>

            <div class="nc-body" id="nc-scroll-area">
                <div id="nc-list-content"></div>
            </div>
        </div>
    </div>

    <div id="story-viewer">
        <div id="close-story">&times;</div>
        <img id="story-img-display" src="" style="max-width:100%; max-height:90vh; object-fit:contain; border-radius:8px;">
        <div id="view-tracker">
            <i class="fa-solid fa-eye"></i>
            <span><span id="view-count">0</span> views</span>
        </div>
        <div id="viewers-list"></div>
    </div>
    
    <div id="toast-container"></div>
    
    <div id="overlay-photo-a" class="story-overlay">
        <div class="overlay-header" style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
            <button onclick="closeStoryFlow()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
            <h3 style="margin: 0;">Create story</h3>
            <div></div>
        </div>
        <div class="gallery-preview-area" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <p>Your selected file is ready...</p>
            <button class="continue-btn" onclick="goToPhotoB()" style="margin-top: 20px; padding: 10px 20px; background: var(--gt-blue); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Continue to Edit</button>
        </div>
    </div>

    <div id="overlay-photo-b" class="story-overlay editor-bg">
        <div class="editor-top">
            <span class="editor-action" onclick="closeStoryFlow()">Remove</span>
            <button class="share-btn" onclick="finalUpload()">Share</button>
        </div>
        <div class="editor-content" style="flex: 1; display: flex; align-items: center; justify-content: center;">
            <img id="editing-preview-img" src="">
        </div>
    </div>

document.addEventListener("DOMContentLoaded", async () => {
    try {
        const { data: { session } } = await _supabase.auth.getSession();

        if (!session && !localStorage.getItem("supabase.auth.token")) {
            window.location.replace("login.html");
            return;
        }

        if (session) {
            myId = session.user.id;
            localStorage.setItem("user_id", myId); 
        }

        // 1. Fetch Profile First (Ensures Avatar is ready)
        const { data: profile } = await _supabase
            .from('profiles')
            .select('avatar_url')
            .eq('id', myId)
            .single();

        if (profile?.avatar_url) {
            const myAvatarImg = document.querySelector('.user-pfp-source');
            if (myAvatarImg) {
                myAvatarImg.src = profile.avatar_url;
            }
        }

        // 2. Render "Your story" immediately with current profile pic
        renderStoryBar([]); 

        // 3. Detect Location & Load Data
        await detectLocation();
        await initMessenger(); 
        await loadStories();    

        _supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_OUT') {
                localStorage.clear();
                window.location.replace("login.html");
            }
        });

    } catch (err) {
        console.error("Initialization Error:", err);
    }

    const closeBtn = document.getElementById('close-story');
    if (closeBtn) {
        closeBtn.onclick = () => {
            document.getElementById('story-viewer').style.display = 'none';
        };
    }
});

async function initMessenger() {
    try {
        await loadChats();
    } catch (err) {
        console.error("Failed to initialize messenger data:", err);
    }
}

async function switchTab(type) {
    document.querySelectorAll('.tab').forEach(t => {
        t.classList.remove('active');
    });

    const selected = document.getElementById(`tab-${type}`);
    selected.classList.add('active');

    const chatContainer = document.getElementById("chat-list-container");
    chatContainer.innerHTML = ''; 

    if (type === 'chats') {
        await loadChats();
    } else {
        chatContainer.innerHTML = `
            <div class="empty-welcome">
                <i class="fa-solid ${type === 'groups' ? 'fa-users' : 'fa-video'}" style="font-size: 50px; color: #333;"></i>
                <h2 style="margin-top:15px;">${type.charAt(0).toUpperCase() + type.slice(1)} coming soon</h2>
            </div>`;
    }
}

async function switchNC(type) {
    const listArea = document.getElementById('nc-list-content');
    const followingCountLabel = document.getElementById('following-count');
    const tabFollowing = document.getElementById('nc-tab-following');
    const tabRecommended = document.getElementById('nc-tab-recommended');
    const searchInput = document.getElementById('nc-search-input');

    tabFollowing.classList.remove('active');
    tabRecommended.classList.remove('active');

    if (type === 'following') {
        tabFollowing.classList.add('active');
        if (searchInput) {
            searchInput.placeholder = "Search friends...";
            searchInput.setAttribute('oninput', 'filterFollowing(this.value)');
        }
    } else {
        tabRecommended.classList.add('active');
        if (searchInput) {
            searchInput.placeholder = "Search...";
            searchInput.setAttribute('oninput', 'filterGlobal(this.value)');
        }
    }

    if (searchInput) searchInput.value = "";
    listArea.innerHTML = '<p style="text-align:center; padding:20px; color:#888;">Searching...</p>';
    
    try {
        if (type === 'following') {
            const { data, error } = await _supabase
                .from('follows')
                .select(`user_id, profiles:user_id (id, username, avatar_url, bio, is_verified, country_code)`)
                .eq('follower_id', myId)
                .limit(50);

            if (error) {
                console.error("Following fetch error:", error);
                throw error;
            }

            followingData = (data || []).map(f => f.profiles).filter(Boolean);
            followingCountLabel.innerText = followingData.length;

            if (followingData.length === 0) {
                listArea.innerHTML = '<p style="text-align:center; padding:20px; color:#888;">You are not following anyone yet.</p>';
            } else {
                renderNCList(followingData, true);
            }
        } else {
            // Try fetching from smart_recommendation first
            let { data, error } = await _supabase
                .from('smart_recommendation')
                .select('id, username, avatar_url, bio, is_verified, country_code, ranking_weight')
                .neq('id', myId)
                .order('ranking_weight', { ascending: false })
                .limit(50);

            // Fallback to profiles table if smart_recommendation is empty or fails
            if (error || !data || data.length === 0) {
                console.warn("Smart recommendation empty or failed, falling back to profiles.");
                const { data: fallbackData, error: fallbackError } = await _supabase
                    .from('profiles')
                    .select('id, username, avatar_url, bio, is_verified, country_code')
                    .neq('id', myId)
                    .limit(50);
                
                if (fallbackError) {
                    console.error("Fallback profiles fetch error:", fallbackError);
                    throw fallbackError;
                }
                data = fallbackData;
            }

            if (!data || data.length === 0) {
                listArea.innerHTML = '<p style="text-align:center; padding:20px; color:#888;">No recommendations available.</p>';
            } else {
                renderNCList(data, false);
            }
        }
    } catch (e) {
        console.error("SwitchNC Exception:", e);
        listArea.innerHTML = '<p style="text-align:center; color:#555; padding:20px;">Connection failed. Check console for details.</p>';
    }
}

async function handleSyncFollow(targetId, btn) {
    try {
        btn.disabled = true;
        btn.innerText = "Following...";
        const { error } = await _supabase.from('follows').insert([{ user_id: targetId, follower_id: myId }]);
        if (error) throw error;
        btn.innerText = "Following";
        btn.classList.remove('follow');
        btn.classList.add('unfollow');
        btn.style.background = "#e4e6eb";
        btn.style.color = "#000";
        updateCount(1);
        showToast("User followed successfully!");
        btn.onclick = (e) => { e.preventDefault(); e.stopPropagation(); handleSyncUnfollow(targetId); };
    } catch (e) {
        console.error(e);
        showToast("Could not follow user.");
        btn.disabled = false;
        btn.innerText = "Follow";
    }
}

function updateCount(val) {
    const label = document.getElementById('following-count');
    if (label) {
        let current = parseInt(label.innerText) || 0;
        label.innerText = Math.max(0, current + val);
    }
}

async function handleSyncUnfollow(targetId) {
    try {
        const { error } = await _supabase.from('follows').delete().match({ user_id: targetId, follower_id: myId });
        if (error) throw error;
        const row = document.getElementById(`user-row-${targetId}`);
        if (row) {
            row.style.transition = "opacity 0.3s ease";
            row.style.opacity = '0';
            setTimeout(() => {
                row.remove();
                const listArea = document.getElementById('nc-list-content');
                if (listArea && listArea.children.length === 0) listArea.innerHTML = '<p style="text-align:center; color:#555; padding:20px;">No friends found.</p>';
            }, 300);
        }
        updateCount(-1);
        showToast("User unfollowed!");
    } catch (e) { console.error(e); showToast("Could not unfollow user."); }
}

function getGeoIcon(countryCode) {
    if (!countryCode) return '';
    return countryCode === currentCountry ? '<i class="fa-solid fa-location-dot" style="color: #FF6B6B; font-size: 10px;"></i>' : '<i class="fa-solid fa-globe" style="color: #999; font-size: 10px;"></i>';
}
    
function renderNCList(users, isFollowingTab) {
    const listArea = document.getElementById('nc-list-content');
    listArea.innerHTML = '';
    users.forEach(user => {
        const div = document.createElement('div');
        div.className = "user-row";
        div.id = `user-row-${user.id}`;
        const leftSide = document.createElement('div');
        leftSide.className = 'user-row-left';
        leftSide.onclick = (e) => { e.stopPropagation(); openChat(user.id, user.username, user.avatar_url || ''); toggleNewChatMenu(); };
        leftSide.innerHTML = `
            <img src="${user.avatar_url || 'https://via.placeholder.com/40'}" alt="${user.username}">
            <div class="user-info">
                <div class="user-info-name"><span>${user.username}</span>${user.is_verified ? '<i class="fa-solid fa-circle-check" style="color: #1DA1F2; font-size: 12px;"></i>' : ''}${getGeoIcon(user.country_code )}</div>
                ${user.bio ? `<div class="user-info-bio">${user.bio}</div>` : ''}
            </div>`;
        const rightSide = document.createElement('div');
        rightSide.className = 'user-row-right';
        let actionButton = document.createElement('button');
        actionButton.className = isFollowingTab ? 'action-btn unfollow' : 'action-btn follow';
        actionButton.innerText = isFollowingTab ? 'Unfollow' : 'Follow';
        actionButton.type = 'button';
        if (isFollowingTab) { actionButton.onclick = (e) => { e.preventDefault(); e.stopPropagation(); handleSyncUnfollow(user.id); }; }
        else { actionButton.onclick = (e) => { e.preventDefault(); e.stopPropagation(); handleSyncFollow(user.id, actionButton); }; }
        rightSide.appendChild(actionButton);
        div.appendChild(leftSide);
        div.appendChild(rightSide);
        listArea.appendChild(div);
    });
}

function showToast(message) {
    const toast = document.getElementById('toast-container');
    if (!toast) return;
    toast.innerText = message;
    toast.classList.remove("show");
    clearTimeout(toastTimer);
    void toast.offsetWidth;
    toast.classList.add("show");
    toastTimer = setTimeout(() => { toast.classList.remove("show"); }, 3000);
}

async function loadStories() {
    try {
        const { data: following } = await _supabase.from('follows').select('user_id').eq('follower_id', myId);
        const { data: followers } = await _supabase.from('follows').select('follower_id').eq('user_id', myId);
        const followingIds = (following || []).map(f => f.user_id);
        const followerIds = (followers || []).map(f => f.follower_id);
        const mutualIds = followingIds.filter(id => followerIds.includes(id));
        mutualIds.push(myId);

        const { data: stories } = await _supabase.from('stories').select('*, profiles(id, username, avatar_url, country_code)').in('user_id', mutualIds).gt('expires_at', new Date().toISOString()).order('created_at', { ascending: false });
        const localStories = (stories || []).filter(s => s.profiles?.country_code === currentCountry);
        const globalStories = (stories || []).filter(s => s.profiles?.country_code !== currentCountry);
        renderStoryBar([...localStories, ...globalStories]);
    } catch (err) { console.error(err); renderStoryBar([]); }
}
    
function renderStoryBar(activeStories) {
    const storyArea = document.getElementById('stories-area');
    const mySlot = document.getElementById('my-story-slot');
    if (!storyArea || !mySlot) return;

    const myActiveStory = activeStories.find(s => s.user_id === myId);
    const myPfp = document.querySelector('.user-pfp-source')?.src || 'https://via.placeholder.com/70';

    if (myActiveStory ) {
        mySlot.innerHTML = `
            <div class="story-item" onclick='openStory(${JSON.stringify(myActiveStory).replace(/'/g, "&apos;")})'>
                <div class="story-avatar active-story"><img src="${myPfp}"></div>
                <span class="story-name">Your story</span>
            </div>`;
    } else {
        mySlot.innerHTML = `
            <div class="story-item" onclick="triggerFilePicker()">
                <div class="story-avatar no-story" style="position:relative;"><img src="${myPfp}"><div class="add-icon-badge"><i class="fa-solid fa-plus"></i></div></div>
                <span class="story-name">Your story</span>
            </div>`;
    }

    const otherStories = activeStories.filter(s => s.user_id !== myId);
    storyArea.innerHTML = otherStories.map(s => `
        <div class="story-item" onclick='openStory(${JSON.stringify(s).replace(/'/g, "&apos;")})'>
            <div class="story-avatar active-story"><img src="${s.profiles?.avatar_url || 'https://via.placeholder.com/70'}"></div>
            <span class="story-name">${s.profiles?.username || 'User'}</span>
        </div>` ).join('');
}

async function openStory(story) {
    const viewer = document.getElementById('story-viewer');
    const img = document.getElementById('story-img-display');
    const viewCountSpan = document.getElementById('view-count');
    const tracker = document.getElementById('view-tracker');
    const viewersList = document.getElementById('viewers-list');
    viewer.style.display = 'flex';
    img.src = story.image_url;

    if (story.user_id === myId) {
        tracker.style.display = 'flex';
        viewersList.style.display = 'block';
        const { data: views, count } = await _supabase.from('story_views').select(`viewer_id, profiles (username, avatar_url)`, { count: 'exact' }).eq('story_id', story.id);
        viewCountSpan.innerText = count || 0;
        viewersList.innerHTML = (views || []).map(v => `
            <div style="display:flex; align-items:center; gap:10px; margin-top:12px; color:white; padding:0 20px;">
                <img src="${v.profiles?.avatar_url || 'https://via.placeholder.com/40'}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                <span style="font-size:15px;">${v.profiles?.username || 'User'}</span>
            </div>` ).join('');
    } else {
        tracker.style.display = 'none';
        viewersList.style.display = 'none';
        const { data: existing } = await _supabase.from('story_views').select('id').eq('story_id', story.id).eq('viewer_id', myId).maybeSingle();
        if (!existing) await _supabase.from('story_views').insert([{ story_id: story.id, viewer_id: myId, viewed_at: new Date().toISOString() }]);
    }
}

async function loadChats() {
    const chatBox = document.getElementById("chat-list-container");
    try {
        const { data: messages } = await _supabase.from('messages').select(`*, sender_profile:sender_id(id, username, avatar_url), receiver_profile:receiver_id(id, username, avatar_url)`).or(`sender_id.eq.${myId},receiver_id.eq.${myId}`).order('created_at', { ascending: false });
        if (!messages || messages.length === 0) chatBox.innerHTML = `<div class="empty-welcome"><i class="fa-solid fa-comment-dots"></i><h2>No messages yet</h2></div>`;
        else renderChats(filterUniqueChats(messages));
    } catch (error) { console.error(error); chatBox.innerHTML = `<p style="text-align:center; padding:20px;">Error loading conversations.</p>`; }
}

async function loadMessages(otherUserId) {
    const container = document.getElementById('message-container');
    container.innerHTML = '<div style="text-align:center;color:#888;">Loading history...</div>';
    const { data } = await _supabase.from('messages').select('*').or(`and(sender_id.eq.${myId},receiver_id.eq.${otherUserId}),and(sender_id.eq.${otherUserId},receiver_id.eq.${myId})`).order('created_at', { ascending: true });
    container.innerHTML = ''; 
    (data || []).forEach(msg => {
        const isMe = msg.sender_id === myId;
        const div = document.createElement('div');
        div.className = `message ${isMe ? 'sent' : 'received'}`;
        const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        let statusHtml = isMe ? (msg.is_read ? '<span class="status-text" style="color:#4ade80;">Seen</span>' : '<span class="status-text">Sent</span>') : '';
        div.innerHTML = `<div class="msg-content">${msg.content}</div><div class="msg-footer" style="display:flex; justify-content:flex-end; gap:5px; font-size:10px; margin-top:4px; opacity:0.6;"><span class="msg-time">${time}</span>${statusHtml}</div>`;
        container.appendChild(div);
    });
    setTimeout(() => { container.scrollTop = container.scrollHeight; }, 100);
}

async function sendMessage() {
    const input = document.getElementById('message-input');
    const content = input.value.trim();
    if (!content || !currentChatId) return;
    const { data: { user } } = await _supabase.auth.getUser();
    if (!user) return showToast("Please login to send messages");
    input.value = '';
    const { error } = await _supabase.from('messages').insert([{ sender_id: user.id, receiver_id: currentChatId, content: content }]);
    if (error) { showToast("Failed to send message"); input.value = content; }
    else loadMessages(currentChatId);
}

function filterUniqueChats(messages) {
    const unique = new Map();
    messages.forEach(m => { const otherId = m.sender_id === myId ? m.receiver_id : m.sender_id; if (!unique.has(otherId)) unique.set(otherId, m); });
    return Array.from(unique.values());
}

function renderChats(chatData) {
    document.getElementById("chat-list-container").innerHTML = chatData.map(chat => {
        const isMe = chat.sender_id === myId;
        const displayUser = isMe ? chat.receiver_profile : chat.sender_profile;
        const isUnread = !isMe && chat.is_read === false;
        const textStyle = isUnread ? 'font-weight: 800; color: white;' : 'font-weight: 400; color: #bbb;';
        const time = new Date(chat.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return `
        <div class="chat-item" onclick="openChat('${displayUser.id}', '${displayUser.username}', '${displayUser.avatar_url || 'https://via.placeholder.com/60'}' )">
            <div class="chat-pfp-wrapper"><img src="${displayUser?.avatar_url || 'https://via.placeholder.com/60'}" class="chat-pfp">${isUnread ? '<span class="unread-dot"></span>' : '<span class="online-status">Now</span>'}</div>
            <div class="chat-info"><div style="display:flex; justify-content:space-between; align-items:center;"><h3>${displayUser?.username || 'User'}</h3><span class="chat-time">${time}</span></div><div class="chat-msg" style="${textStyle}">${isMe ? '<span style="color:var(--gt-blue );">You: </span>' : ''}${chat.content}</div></div>
            <i class="${chat.is_read ? 'fa-solid fa-circle-check' : 'fa-regular fa-circle-check'}" style="color:var(--gt-blue); font-size: 12px; margin-left: 5px;"></i>
        </div>`;
    }).join('');
}

function handleTyping() {
    if (!currentChatId) return;
    _supabase.channel(`chat:${currentChatId}`).send({ type: 'broadcast', event: 'typing', payload: { sender_id: myId, isTyping: true } });
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => { _supabase.channel(`chat:${currentChatId}`).send({ type: 'broadcast', event: 'typing', payload: { sender_id: myId, isTyping: false } }); }, 2000);
}

function toggleNewChatMenu() {
    const menu = document.getElementById('newChatMenu');
    const isOpening = !menu.classList.contains('active');
    if (isOpening) { menu.style.display = 'flex'; menu.classList.add('active'); switchNC('following'); }
    else { menu.style.display = 'none'; menu.classList.remove('active'); }
}

function filterFollowing(query) {
    const filtered = followingData.filter(u => u.username && u.username.toLowerCase().includes(query.toLowerCase()));
    renderNCList(filtered, true);
}

async function filterGlobal(val) {
    const listArea = document.getElementById('nc-list-content');
    const searchVal = val.trim().toLowerCase();
    clearTimeout(typingTimeout);
    if (!searchVal) return switchNC('recommended'); 
    typingTimeout = setTimeout(async () => {
        try {
            const { data } = await _supabase.from('profiles').select('id, username, avatar_url, is_verified, country_code, bio').ilike('username', `%${searchVal}%`).neq('id', myId).limit(20);
            listArea.innerHTML = '';
            if (!data || data.length === 0) return listArea.innerHTML = '<p style="text-align:center; padding:20px; color:#888;">No users found.</p>';
            renderNCList(data, false);
        } catch (e) { console.error(e); }
    }, 500);
}

let selectedFileBlob = null;
const storyTrigger = document.getElementById('story-menu-trigger');
if (storyTrigger) { storyTrigger.onclick = () => { const dropdown = document.getElementById('story-dropdown'); dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block'; }; }
function triggerFilePicker() { document.getElementById('story-upload-input').click(); document.getElementById('story-dropdown').style.display = 'none'; }
document.getElementById('story-upload-input').onchange = (e) => { const file = e.target.files[0]; if (!file) return; selectedFileBlob = file; document.getElementById('overlay-photo-a').style.display = 'flex'; };
function goToPhotoB() { const reader = new FileReader(); reader.onload = (event) => { document.getElementById('editing-preview-img').src = event.target.result; document.getElementById('overlay-photo-a').style.display = 'none'; document.getElementById('overlay-photo-b').style.display = 'flex'; }; reader.readAsDataURL(selectedFileBlob); }
async function finalUpload() {
    if (!selectedFileBlob) return;
    showToast("Sharing to story...");
    const filePath = `${myId}/${Date.now()}_story.jpg`;
    const { error: uploadError } = await _supabase.storage.from('story-images').upload(filePath, selectedFileBlob);
    if (uploadError) return showToast("Upload failed!");
    const { data: urlData } = _supabase.storage.from('story-images').getPublicUrl(filePath);
    await _supabase.from('stories').insert([{ user_id: myId, image_url: urlData.publicUrl, expires_at: new Date(Date.now() + 24*60*60*1000).toISOString() }]);
    closeStoryFlow();
    showToast("Story shared successfully!");
    setTimeout(async () => { await loadStories(); }, 500);
}
function closeStoryFlow() { document.querySelectorAll('.story-overlay').forEach(el => el.style.display = 'none'); selectedFileBlob = null; }
function toggleStories() { const storiesDiv = document.getElementById('stories-collapsible'); const chevron = document.getElementById('stories-chevron'); const isHidden = storiesDiv.style.display === "none"; storiesDiv.style.display = isHidden ? "block" : "none"; chevron.style.transform = isHidden ? "rotate(0deg)" : "rotate(-90deg)"; }
async function markAsRead(otherUserId) { try { await _supabase.from('messages').update({ is_read: true }).eq('receiver_id', myId).eq('sender_id', otherUserId).eq('is_read', false); if (typeof loadChats === "function") loadChats(); } catch (error) { console.error(error); } }
function openChat(userId, userName, userAvatar) { currentChatId = userId; document.getElementById('chat-user-name').innerText = userName; document.getElementById('chat-user-avatar').src = userAvatar || 'https://via.placeholder.com/40'; document.getElementById('chat-overlay' ).style.display = 'flex'; loadMessages(userId); markAsRead(userId); }
function closeChat() { document.getElementById('chat-overlay').style.display = 'none'; currentChatId = null; }
function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
</script> 
    
<div id="chat-overlay" class="chat-overlay">
    <div class="chat-header">
        <i class="fa-solid fa-arrow-left" onclick="closeChat()"></i>
        <img id="chat-user-avatar" src="https://via.placeholder.com/40" class="header-avatar">
        <div class="chat-user-info"><span id="chat-user-name">Loading...</span><span class="status-dot">Online</span></div>
    </div>
    <div id="message-container" class="message-container"></div>
    <div class="chat-input-bar">
        <input type="text" id="message-input" placeholder="Type a message..." oninput="handleTyping( )" onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
</div>
