 }

.nav-tab {

/* 1. The "Base" for the blue line */
.nav-indicator { 
    position: absolute; 
    bottom: -2px; /* Moves it slightly below the text */
    left: 50%; /* Move the start point to the middle of the tab */
    transform: translateX(-50%); /* Pulls the line back so its center matches the text center */
    width: 0; 
    height: 3px; 
    background: #1DA1F2; 
    border-radius: 10px; /* Makes the ends of the line rounded/smooth */
    transition: 0.3s ease; 
}

    width: 25px; /* Set a fixed width so it looks like a clean tab indicator */

/* HEART POP ANIMATION */
@keyframes popHeart {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; }
    100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
}

.heart-pop {
    position: absolute; 
    color: #ff2d55; 
    font-size: 90px;
    opacity: 0; 
    pointer-events: none; 
    z-index: 100;
    left: 50%; 
    top: 50%; 
    transform: translate(-50%, -50%);
    animation: popHeart 0.6s ease-out;
}

        /* Container for the specific TikTok upload button style */
.tiktok-upload-wrapper {
    position: relative;
    width: 45px; /* The overall button width */
    height: 40px; /* The overall button height */
    margin: 0 auto; /* Center in the menu item */
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

/* Background "Color Shadows" (Pseudo-elements) */
.tiktok-upload-wrapper::before,
.tiktok-upload-wrapper::after {
    content: '';
    position: absolute;
    width: 32px; /* The main square size */
    height: 32px; /* The main square size */
    border-radius: 8px; /* TikTok uses slightly rounded corners */
}

/* 1. Left (Cyan) shadow */
.tiktok-upload-wrapper::before {
    background-color: #00f2ea;
    left: 2px; /* Pull left */
}

/* 2. Right (Magenta) shadow */
.tiktok-upload-wrapper::after {
    background-color: #ff0050;
    right: 2px; /* Pull right */
}

/* 3. The Main White Square */
.tiktok-upload-square {
    position: relative; /* Sits above the shadows */
    width: 32px;
    height: 32px;
    background-color: #fff;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1; /* Ensures it sits on top */
}

/* 4. The Plus (+) Icon itself */
.tiktok-upload-square i {
    color: #000 !important; /* Forces the icon to be black on the white box */
    font-size: 18px !important; /* Adjust size to fit in the box */
    margin: 0 !important; /* Removes default margins */
  }

 /* Professional Badge Styling */

/* Optional: Pulse animation to grab user attention */
.badge-indicator::after {
    content: '';

    height: 100%;
    background: #ff3b30;
    border-radius: 50%;

  async function toggleFeed(type) {  
    const feed = document.getElementById("tiktok-feed");
    
    // 1. Auth Check
    if (type === 'following' && !myId) { 
        showToast("Please login"); 
        return; 
    }  
    
    // 2. Update Tabs UI
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));  
    document.getElementById(`tab-${type}`).classList.add('active');  

    // 3. Get User's Home Country from LocalStorage (or fetch it)
    // Tip: When the user logs in or saves their profile, save their country_code to localStorage too!
    const myHome = localStorage.getItem("user_country") || 'Global';

    const isVideoFile = (url) => url && url.toLowerCase().match(/\.(mp4|mov|m4v|webm)/i);
    const interests = JSON.parse(localStorage.getItem("my_interests")) || [];  
    let filteredPosts = [];  

    // 4. UPGRADED Filtering Logic
    if (type === 'trending') {  
        feed.classList.add('trending-mode');
        // Trending shows Global content + Content from their Home Country
        filteredPosts = allPosts.filter(p => 
            p.country_code === 'Global' || p.country_code === myHome
        );
        filteredPosts = shuffleArray(filteredPosts); 
        
    } else if (type === 'following') {  
        feed.classList.remove('trending-mode');
        // Following strictly shows people you follow
        let followingVideos = allPosts.filter(p => interests.includes(p.user_id));
        filteredPosts = shuffleArray(followingVideos); 
        
    } else {  
        // 'For You' - The Professional Blend
        feed.classList.remove('trending-mode');
        // Show everything but prioritize Global and Home Country
        filteredPosts = allPosts.filter(p => {
            const isRegional = (p.country_code === 'Global' || p.country_code === myHome);
            return isVideoFile(p.video_url) && isRegional;
        });
        filteredPosts = shuffleArray(filteredPosts); 
    }

    // 5. Final Step: Render
    renderFeed(filteredPosts, type === 'following');  
    feed.scrollTop = 0;  
     
  }  
     
    async function likePostGlobal(id, el) {  
        if (!myId) { showToast("Please login"); return; }  
        const heart = el.querySelector(".heart-icon");  
        const countLabel = el.querySelector(".action-count");  
        let likes = parseInt(countLabel.innerText.replace('k','000').replace('M','000000')) || 0;  
        if (localStorage.getItem("liked_" + id)) {  
            likes--; localStorage.removeItem("liked_" + id); heart.classList.remove("liked");  
        } else {  
            likes++; localStorage.setItem("liked_" + id, "1"); heart.classList.add("liked");  
        }  
        countLabel.innerText = nFormatter(likes);  
        fetch(`${SUPABASE_URL}/rest/v1/posts?id=eq.${id}`, {   
            method: "PATCH",   
            headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },   
            body: JSON.stringify({ likes: likes })   
        });  
    }  

    function toggleDropdown() { document.getElementById('notifDropdown').classList.toggle('show'); }  
    window.handleFollow = async function(uid, btn) {  
    if (!myId) { showToast("Please login"); return; }  
    
    let cur = JSON.parse(localStorage.getItem("my_interests")) || [];  
    let isNowFollowing = false;

    if (!cur.includes(uid)) { 
        cur.push(uid); 
        isNowFollowing = true;
    } else { 
        cur = cur.filter(i => i !== uid); 
        isNowFollowing = false;
    }  

    localStorage.setItem("my_interests", JSON.stringify(cur));   

    // --- GLOBAL SYNC ---
    document.querySelectorAll(`button[onclick*="${uid}"]`).forEach(button => {
        // Change the text
        button.textContent = isNowFollowing ? "Following" : "Follow";
        
        // Only turn grey if it's a TRENDING button
        if (button.classList.contains('trending-follow-btn')) {
            if (isNowFollowing) button.classList.add('following');
            else button.classList.remove('following');
        } else {
            // For the TikTok style (For You/Following), ensure grey is ALWAYS removed
            button.classList.remove('following');
        }
    });
};

    
    function toggleCaption(postId, fullText, type) {
    const captionEl = document.getElementById(`caption-${type}-${postId}`);
    const toggleEl = document.getElementById(`toggle-${type}-${postId}`);
    
    if (toggleEl.innerText.includes("More")) {
        captionEl.innerText = fullText;
        toggleEl.innerText = " Hide";
    } else {
        captionEl.innerText = fullText.substring(0, 80) + "...";
        toggleEl.innerText = " More";
    }
   }

function shuffleArray(array) {
   for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}
