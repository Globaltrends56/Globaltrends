<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT Messenger</title>
    
    <!-- External Tools -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://kit.fontawesome.com/your-font-awesome-key.js" crossorigin="anonymous"></script>

    <style>
        :root { --gt-blue: #007bff; --bg-gray: #f0f2f5; }
        body { margin: 0; font-family: sans-serif; background: var(--bg-gray); }

        /* Header & Stories Area */
        header { background: #fff; padding: 15px; border-bottom: 1px solid #ddd; }
        .stories-wrapper { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        
        .story-item { text-align: center; cursor: pointer; min-width: 75px; }
        .story-avatar { 
            width: 70px; height: 70px; border-radius: 50%; 
            border: 3px solid #ddd; padding: 2px; position: relative;
        }
        .story-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .active-story { border-color: var(--gt-blue); }
        .add-icon-badge { 
            position: absolute; bottom: 0; right: 0; 
            background: var(--gt-blue); color: #fff; 
            border-radius: 50%; width: 20px; height: 20px; font-size: 12px;
        }

        /* Chat Container */
        #talkjs-container { height: 75vh; width: 100%; max-width: 1000px; margin: 20px auto; }
    </style>
</head>
<body>

<header>
    <div class="stories-wrapper">
        <div id="my-story-slot"></div>
        <div id="stories-area" style="display: flex; gap: 15px;"></div>
    </div>
</header>

<script>

    const _supabase = supabase.createClient('https://spnvgymmrlyqtfrbjjsg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwbnZneW1tcmx5cXRmcmJqanNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5MzM4ODMsImV4cCI6MjA4MzUwOTg4M30.EAgw94HZsHa21YLcTuV0GLAlUeRZN-ixKA0QeD5oPNI');
    let myId, myUsername, myPfp;

    // --- PART 2: INITIALIZE APP ---
    async function initApp() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
            window.location.href = "login.html";
            return;
        }

        myId = session.user.id;
        myUsername = session.user.user_metadata?.username || "User";
        myPfp = session.user.user_metadata?.avatar_url || "https://via.placeholder.com/70";

        loadTalkJS();
        renderStories(); 
    }

    // --- PART 3: TALKJS LOGIC ---
    function loadTalkJS() {
        Talk.ready.then(function () {
            const me = new Talk.User({
                id: myId,
                name: myUsername,
                photoUrl: myPfp,
                role: 'default'
            });

            const session = new Talk.Session({
                appId: 'tOHa0rVX', // <--- PASTE YOUR TEST ID HERE
                me: me,
            });

            const inbox = session.createInbox();
            inbox.mount(document.getElementById('talkjs-container'));
        });
    }

    // --- PART 4: STORY LOGIC ---

        // Here we can reuse your existing renderStoryBar logic
